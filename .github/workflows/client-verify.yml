name: Client - build and test

on:
  push:
    branches:
      - "**"
    paths:
      - "client/**"
      - ".github/workflows/client-verify.yml"
  pull_request:
    paths:
      - "client/**"

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Run tests
        run: flutter test
